services:
  docker:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins-data:/var/jenkins_home
      - docker-certs:/certs/client
    networks:
      - jenkins

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - jenkins-data:/var/jenkins_home
    ports:
      - 8080:8080
    networks:
      - jenkins

  jenkins-builder:
    build:
      context: .
      dockerfile: Dockerfile.sshagent
      pull: true
    networks:
      - jenkins
    # generer pubkey dans docker jenkins principal
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMlqzfzZ0OawDrkXqEeBppMWklFZL3GumM+Wk9HEJ+k2 jenkins
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins-data:/var/jenkins_home
      - docker-certs:/certs/client:ro
    depends_on:
      - docker

networks:
  jenkins:


volumes:
  jenkins-data:
  docker-certs: